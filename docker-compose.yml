services:
  ocr-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-backend
    ports:
      - "5000:5000"
    volumes:
      # Mount local Google credentials JSON into the container
      - ./backend/pdf-ocr-project-464314-ce102c4552b2.json:/app/key.json:ro
    environment:
      # Tell Google SDK where the credentials are
      - GOOGLE_APPLICATION_CREDENTIALS=/app/key.json
      - MONGO_URI=mongodb://ocr-mongo:27017/PDF_OCR
    depends_on:
      - ocr-mongo

  ocr-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr-frontend
    ports:
      - "3000:3000"
    depends_on:
      - ocr-backend
    environment:
      - REACT_APP_API_BASE=http://localhost:5000
    stdin_open: true
    tty: true

  ocr-mongo:
    image: mongo:6.0
    container_name: ocr-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/pdf_ocr_db/users

volumes:
  mongo-data:
